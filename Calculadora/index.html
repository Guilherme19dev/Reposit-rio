<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <script src="script.js" defer></script>
        <link rel="stylesheet" href="index.css">
        <title>Calculadora</title>
    </head>
            <body>
               
                  <div id= "caixa" class="container">
                     <div id="tela" class="resutados">
                  <p id="resutado" class="mostrar"></p>
                  <p id="resutado3" class="signal"></p>
                  <p id="resutado2" class="exibir"></p>
                  
                  </div>
                    <div id="numeros" class="botoes">
                        <button type="button1" class="um" id="one">1</button>
                        <button type="button2" class="um" id="two">2</button>
                        <button type="button3" class="um"id="three">3</button>
                        <button type="button4" class="um"id="four">4</button>
                        <button type="button5" class="um"id="five">5</button>
                        <button type="button6" class="um"id="six">6</button>
                        <button type="button7" class="um"id="seven">7</button>
                        <button type="button8" class="um"id="eight">8</button>
                        <button type="button9" class="um"id="nine">9</button>
                        <button type="button0" class="um"id="zero">0</button>
                    </div>
                        <div id="operadores" class="icones">
                            <button type="button" class="sinal" id="mais">+</button>
                            <button type="button"class="sinal" id="menos">-</button>
                            <button type="button"class="sinal"id="vezes">*</button>
                            <button type="button"class="sinal"id="divisao">/</button>
                            <button type="button"class="sinal"id="igual">=</button>

                        </div>
                 </div>
                 
            </body>
</html>
